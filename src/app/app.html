<header class="sticky-header">
  <div class="sticky-profile" [class.visible]="showStickyHeader">
    <img class="sticky-avatar" src="assets/images/cv.png" alt="" />
    <h1 class="sticky-name">{{ languageService.data().personal.name }}</h1>
  </div>

  <div class="controls">
    <button class="icon-btn" (click)="toggleTheme()">
      🌗
    </button>
    <button class="icon-btn" (click)="language.toggleLanguage()">
      {{ language.currentLanguage() === 'es' ? 'EN' : 'ES' }}
    </button>
    <button class="icon-btn" (click)="print()">
      🖨️
    </button>
    <a class="icon-btn" href="https://asanchezed.github.io/old-curriculum/resume/" target="_blank" title="See old CV version">
      📜
    </a>
  </div>
</header>

<app-hero></app-hero>
<app-experience></app-experience>
<app-education></app-education>
<app-skills></app-skills>
<app-languages></app-languages>
<app-contact></app-contact>
